<section class="team">
  <h2 class="team__heading">Our Team</h2>
  <p class="team__desc">The people behind the platform.</p>

  <div class="team__grid">
    @for (member of members; track member.name) {
      <div class="team__card">
        <div class="team__avatar" [style.background-color]="member.color">
          {{ member.initials }}
        </div>
        <div class="team__info">
          <h3 class="team__name">{{ member.name }}</h3>
          <p class="team__role">{{ member.role }}</p>
        </div>
      </div>
    }
  </div>
</section>
